<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post — Anushka Singh</title>
  <meta name="description" content="Blog post by Anushka Singh.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <nav class="nav" role="navigation" aria-label="Main navigation">
    <div class="nav__inner">
      <a href="index.html" class="nav__logo">Anushka Singh</a>
      <button class="nav__toggle" aria-label="Toggle menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav__links">
        <li><a href="index.html" class="nav__link">Home</a></li>
        <li><a href="services.html" class="nav__link">Services</a></li>
        <li><a href="projects.html" class="nav__link">Projects</a></li>
        <li><a href="blog.html" class="nav__link">Blog</a></li>
        <li><a href="dance.html" class="nav__link">Dance</a></li>
        <li><a href="about.html" class="nav__link">About</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <article class="post container--narrow">
      <a href="blog.html" class="post__back">&larr; All Posts</a>
      <header class="post__header">
        <time class="post__date" id="post-date"></time>
        <h1 class="post__title" id="post-title">Loading...</h1>
        <div class="post__tags" id="post-tags"></div>
      </header>
      <div class="post__content" id="post-content"></div>
    </article>
  </main>

  <footer class="footer">
    <div class="footer__inner">
      <ul class="footer__links">
        <li><a href="services.html" class="footer__link">Services</a></li>
        <li><a href="projects.html" class="footer__link">Projects</a></li>
        <li><a href="blog.html" class="footer__link">Blog</a></li>
        <li><a href="dance.html" class="footer__link">Dance</a></li>
        <li><a href="about.html" class="footer__link">About</a></li>
      </ul>
      <p class="footer__copy">&copy; 2025 Anushka Singh. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="../shared/js/site-config.js"></script>
  <script src="../shared/js/markdown-engine.js"></script>
  <script src="../shared/js/content-loader.js"></script>
  <script src="../shared/js/tag-filter.js"></script>
  <script src="../shared/js/router.js"></script>
  <script src="js/main.js"></script>
  <script>
    Router.loadBySlug({
      manifestUrl: '../content/blog-manifest.json',
      contentBase: '../content/',
      renderFn: (item, html) => {
        document.title = item.title + ' — Anushka Singh';
        document.getElementById('post-title').textContent = item.title;
        document.getElementById('post-date').textContent = Router.formatDate(item.date);
        document.getElementById('post-date').setAttribute('datetime', item.date);
        document.getElementById('post-content').innerHTML = html;
        if (item.tags) {
          document.getElementById('post-tags').innerHTML = item.tags.map(t =>
            '<span class="card__tag">' + t + '</span>'
          ).join('');
        }
      },
      notFoundFn: () => {
        document.getElementById('post-title').textContent = 'Post Not Found';
        document.getElementById('post-content').innerHTML = '<p>This post doesn\'t exist. <a href="blog.html">Browse all posts</a>.</p>';
      }
    });
  </script>
</body>
</html>
